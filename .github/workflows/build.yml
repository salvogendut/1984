name: build

on:
  push:
    branches: [main, windows-port]
    tags:     ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  linux:
    name: Linux (Fedora)
    runs-on: ubuntu-latest
    container: fedora:41
    steps:
      - name: Install build deps
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            gcc make autoconf automake pkgconf-pkg-config \
            SDL3-devel git
      - uses: actions/checkout@v4
      - name: Configure
        run: |
          autoreconf -iv
          ./configure
      - name: Build
        run: make -j$(nproc)
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: 1984-linux-x86_64
          path: 1984

  windows:
    name: Windows (MinGW)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - name: Set up MSYS2 + MinGW + SDL3
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-sdl3
            autoconf
            automake
      - name: Configure
        run: |
          autoreconf -iv
          ./configure
      - name: Build
        run: make -j$(nproc)
      - name: Stage binary + DLLs
        run: |
          mkdir dist
          cp 1984.exe dist/
          # Bundle the MinGW runtime + SDL3 DLLs the .exe needs to run
          for dll in $(ldd dist/1984.exe | awk '/mingw64/ {print $3}'); do
            cp "$dll" dist/
          done
          cp -r roms dist/
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: 1984-windows-x86_64
          path: dist/

  flatpak:
    name: Flatpak (x86_64)
    # Slow (~15 min); skip on PRs (the manifest builds branch:main, so a PR
    # build wouldn't reflect the PR anyway). Runs on main, tags, and manual
    # dispatch. The Linux job already covers PR compile breakage.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: 1984.flatpak
          manifest-path: io.github.salvogendut.Emulator1984.yml
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: false
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: 1984-flatpak-x86_64
          path: 1984.flatpak

  release:
    name: Publish GitHub Release
    needs: [linux, windows, flatpak]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Package release assets
        run: |
          set -e
          tag="${GITHUB_REF_NAME}"
          mkdir -p assets

          # Linux: rename the bare ELF so it does not collide with the tag name
          cp artifacts/1984-linux-x86_64/1984 "assets/1984-${tag}-linux-x86_64"
          chmod +x "assets/1984-${tag}-linux-x86_64"

          # Windows: zip the full bundle (exe + DLLs + roms)
          (cd artifacts/1984-windows-x86_64 && zip -r "../../assets/1984-${tag}-windows-x86_64.zip" .)

          # Flatpak: single-file bundle, installable with `flatpak install`
          cp artifacts/1984-flatpak-x86_64/1984.flatpak "assets/1984-${tag}-x86_64.flatpak"

          ls -la assets/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
